blueprint:
  name: "Proximity Test"
  description: >
    Test blueprint for validating proximity trigger reliability.
    Sends a notification on approach and departure only — no garage
    door, no Car Tag gate. Supports both proximity domain entities
    and sensor domain distance entities (e.g. sensor.*_distance).
    Remove and replace with the full Proximity Garage Opener blueprint
    once proximity is confirmed stable.
  domain: automation
  source_url: https://github.com/asucrews/ha-blueprints/blob/main/blueprints/automation/real_automatic_garage_door_opener/v1/proximity_test.yaml
  input:

    # ─────────────────────────────────────────
    # GROUP 1 — Tracking
    # ─────────────────────────────────────────
    tracking:
      name: "Tracking"
      icon: mdi:map-marker-account
      input:
        proximity_entity:
          name: Proximity Distance Entity
          description: >
            The proximity distance entity for the tracked person. Accepts
            both proximity domain entities and sensor domain distance
            entities (e.g. sensor.lan_proximity_to_home_lan_nguyen_distance).
          selector:
            entity:
              domain:
                - proximity
                - sensor

        tracked_person:
          name: Tracked Person or Device
          description: >
            The person or device_tracker entity being monitored.
          selector:
            entity:
              domain:
                - person
                - device_tracker

    # ─────────────────────────────────────────
    # GROUP 2 — Distance Threshold
    # ─────────────────────────────────────────
    threshold:
      name: "Distance Threshold"
      icon: mdi:ruler
      input:
        distance_threshold:
          name: Distance Threshold (meters)
          description: >
            Distance in meters at which to trigger. 205 ft ≈ 62 m.
            Recommend starting large (500 m) during testing.
          default: 500
          selector:
            number:
              min: 10
              max: 2000
              step: 1
              unit_of_measurement: m
              mode: slider

    # ─────────────────────────────────────────
    # GROUP 3 — Notification
    # ─────────────────────────────────────────
    notification:
      name: "Notification"
      icon: mdi:cellphone
      input:
        notify_device:
          name: Mobile App Device
          description: Device running the HA Companion app to notify.
          selector:
            device:
              integration: mobile_app

        notify_service:
          name: Notify Service (override)
          description: >
            Optional. Override device above with a specific notify service,
            e.g. notify.mobile_app_jeremy_iphone. Leave blank to use the
            device selected above.
          default: ""
          selector:
            text: {}

        approaching_title:
          name: Approaching Title
          default: "[TEST] Approaching"
          selector:
            text: {}

        departing_title:
          name: Departing Title
          default: "[TEST] Departing"
          selector:
            text: {}

mode: single

variables:
  proximity_entity: !input proximity_entity
  tracked_person: !input tracked_person
  distance_threshold: !input distance_threshold
  notify_device: !input notify_device
  notify_service: !input notify_service
  # Resolves distance from either sensor state or proximity attribute
  current_distance: >
    {% set attr = state_attr(proximity_entity, 'distance') %}
    {% if attr is not none %}
      {{ attr | float(-1) }}
    {% else %}
      {{ states(proximity_entity) | float(-1) }}
    {% endif %}

trigger:
  - id: approaching
    platform: template
    value_template: >
      {{ current_distance <= distance_threshold and current_distance >= 0 }}

  - id: departing
    platform: template
    value_template: >
      {{ current_distance > distance_threshold }}

condition:
  - condition: template
    value_template: >
      {% if trigger.id == 'approaching' %}
        {{ states(tracked_person) not in ['home', 'unknown', 'unavailable'] }}
      {% elif trigger.id == 'departing' %}
        {{ states(tracked_person) in ['home', 'not_home'] }}
      {% else %}
        false
      {% endif %}

action:
  - variables:
      resolved_service: >
        {% if notify_service | length > 0 %}
          {{ notify_service }}
        {% else %}
          notify.mobile_app_{{ device_attr(notify_device, 'name') | slugify }}
        {% endif %}

  - choose:
      - conditions:
          - condition: trigger
            id: approaching
        sequence:
          - service: "{{ resolved_service }}"
            data:
              title: !input approaching_title
              message: >
                Proximity test — entered threshold.
                Distance: {{ current_distance | round(1) }} m
                Person state: {{ states(tracked_person) }}

      - conditions:
          - condition: trigger
            id: departing
        sequence:
          - service: "{{ resolved_service }}"
            data:
              title: !input departing_title
              message: >
                Proximity test — exited threshold.
                Distance: {{ current_distance | round(1) }} m
                Person state: {{ states(tracked_person) }}
