blueprint:
  homeassistant:
    min_version: 2026.3.0
  domain: automation
  source_url: https://github.com/asucrews/ha-blueprints/blob/main/blueprints/automation/witb_plus_actions_lights/v3/witb_plus_actions_lights.yaml
  name: V3 WITB+ Actions - Lights (3.0.1)
  description: |
    Version: 3.0.1 — see CHANGELOG.md for full version history.

    Lights-only action orchestrator for a WITB+ room. Identical to the
    Lights + Fan blueprint but with all fan inputs and logic removed.
    Use this blueprint for rooms that have no fan to control.

    Responds to occupancy state changes from an occupied_effective sensor
    and controls lights accordingly.

    FULLY EVENT-DRIVEN
      All blocking delay: steps have been replaced with dedicated timers.
      Every automation run completes in milliseconds. mode:restart is safe
      across all paths — no run can be killed mid-sequence while waiting.
      The companion tag-cleanup blueprint (witb_plus_actions_cleanup) is
      still recommended as belt-and-suspenders but is no longer the primary
      safety net.

    LIGHTS
      • Turns lights ON when the room becomes occupied (gated by light_gating_entity).
      • Day and night brightness profiles with configurable transition speeds.
      • Soft-Off warning: dims to 10% then starts soft_off_timer before full off.
      • Verify: starts lights_verify_timer after turn-off; retries up to N times.
      • Manual-off hold: if you turn lights off while occupied, they stay off until
        the room goes vacant — no re-assertion from continued motion.
      • Bed suppress: if a bed sensor is configured and someone is in bed, lights
        will not auto-turn ON from occupancy re-assertion.

    GATING
      • light_gating_entity: external binary sensor controlling whether lights
        may turn ON. Compute lux, sun, curtains, season etc. externally.

    REQUIRED HELPERS (one set per room)
      • timer — soft_off_timer        (required when lights_soft_off_enabled is true)
      • timer — lights_verify_timer   (required when lights_off_verify_enabled is true)
      • input_number — lights_verify_attempts_helper  (required when retries > 0)

    See CHANGELOG.md for full version history and migration notes.

  input:
    core:
      name: Core
      icon: mdi:home-automation
      description: Required occupancy + optional override/cooldown/startup protections.
      collapsed: false
      input:
        occupied_effective:
          name: Effective occupancy sensor (WITB+)
          description: Use the room's effective occupancy sensor (binary_sensor.<slug>_occupied_effective).
          selector:
            entity:
              domain: binary_sensor

        automation_override:
          name: Automation override (optional)
          description: If set and ON, the blueprint performs no actions.
          default: ''
          selector:
            entity:
              domain: input_boolean

        blocking_entities:
          name: Blocking entities (optional)
          description: Select one or more input_booleans. If ANY are ON, vacancy actions (OFF) are blocked.
          default: []
          selector:
            entity:
              domain: input_boolean
              multiple: true

        startup_cleanup:
          name: Startup cleanup (recommended)
          description: If true, runs cleanup logic after HA restart (safe double-tap validation).
          default: true
          selector:
            boolean: null

        startup_cleanup_delay:
          name: Startup cleanup delay
          description: Delay after HA start before running cleanup.
          default: 00:00:15
          selector:
            duration: null

        on_debounce:
          name: Occupied debounce
          description: Require occupied_effective to be ON for this long before running ON actions.
          default: 00:00:00
          selector:
            duration: null

        cooldown_timer:
          name: Cooldown timer (optional)
          description: Optional timer to prevent rapid ON triggering.
          default: ''
          selector:
            entity:
              domain: timer

        cooldown_duration:
          name: Cooldown duration
          description: Duration used when starting cooldown_timer.
          default: 00:00:30
          selector:
            duration: null

    lights:
      name: Lights
      icon: mdi:lightbulb
      description: Light targets and behavior.
      collapsed: false
      input:
        lights:
          name: Lights to control
          description: Lights this automation may turn on/off.
          default: []
          selector:
            entity:
              domain: light
              multiple: true

        auto_tag_lights:
          name: Auto-tag boolean for lights (recommended)
          description: Set ON when automation turns lights ON; required for safe OFF.
          default: ''
          selector:
            entity:
              domain: input_boolean

        light_gating_entity:
          name: 'Lights: gating entity (optional)'
          description: >
            External binary sensor that must be ON for lights to turn ON.
            Leave empty to always allow lights ON (no gating).
          default: ''
          selector:
            entity:
              domain: binary_sensor

        bed_occupied:
          name: 'Lights: bed sensor (optional)'
          description: >
            Binary sensor that is ON when someone is in bed.
            Used by suppress_lights_on_when_in_bed.
          default: ''
          selector:
            entity:
              domain: binary_sensor

        suppress_lights_on_when_in_bed:
          name: 'Lights: suppress auto-ON when in bed'
          description: >
            When ON: if the bed sensor is ON and lights are currently OFF,
            occupied_on will NOT turn lights on.
          default: true
          selector:
            boolean: null

        lights_on_script:
          name: Lights ON script (optional)
          default: ''
          selector:
            entity:
              domain: script

        lights_off_script:
          name: Lights OFF script (optional)
          default: ''
          selector:
            entity:
              domain: script

        transition_on:
          name: 'Lights: ON transition (Day)'
          default: 1
          selector:
            number:
              min: 0
              max: 30
              mode: slider

        transition_on_night:
          name: 'Lights: ON transition (Night)'
          default: 3
          selector:
            number:
              min: 0
              max: 30
              mode: slider

        transition_off:
          name: 'Lights: OFF transition'
          default: 2
          selector:
            number:
              min: 0
              max: 60
              mode: slider

        lights_soft_off_enabled:
          name: 'Lights: Soft-Off Warning'
          description: >
            If true, dims lights to 10% and starts soft_off_timer (15 s) before
            turning off completely. Requires soft_off_timer to be configured.
          default: false
          selector:
            boolean: null

        soft_off_timer:
          name: 'Lights: Soft-Off timer (required if Soft-Off enabled)'
          description: >
            timer.<slug>_actions_soft_off. Drives the 15 s dim-before-off warning.
            Required when lights_soft_off_enabled is true.
          default: ''
          selector:
            entity:
              domain: timer

        lights_claim_if_already_on:
          name: 'Lights: claim ownership if already ON'
          description: >
            If true (default), the blueprint turns lights ON (taking ownership) even if they
            were already on when the room became occupied. This ensures the blueprint
            will also turn them OFF on vacancy. Set false only if you want the blueprint
            to leave pre-existing light state alone and not take ownership.
          default: true
          selector:
            boolean: null

        lights_off_delay:
          name: 'Lights: off-delay after vacancy'
          default: 00:02:00
          selector:
            duration: null

    lights_off_verification:
      name: Lights off verification
      icon: mdi:timer-refresh
      description: >
        Event-driven verify/retry. Requires lights_verify_timer and
        lights_verify_attempts_helper to be configured for retry support.
      collapsed: true
      input:
        lights_off_verify_enabled:
          name: 'Lights: verify/retry OFF'
          default: true
          selector:
            boolean: null

        lights_verify_timer:
          name: 'Lights: verify timer (required if verify enabled)'
          description: >
            timer.<slug>_actions_lights_verify. Drives the post-off verification
            wait and retry intervals. Required when lights_off_verify_enabled is true.
          default: ''
          selector:
            entity:
              domain: timer

        lights_verify_attempts_helper:
          name: 'Lights: verify attempts counter (required for retries)'
          description: >
            input_number.<slug>_actions_verify_attempts. Tracks retry count
            across timer-fired runs. Required when lights_off_verify_retries > 0.
            If not configured, only a single verify check is performed.
          default: ''
          selector:
            entity:
              domain: input_number

        lights_off_verify_delay:
          name: 'Lights: initial verify delay'
          description: How long to wait after the first turn-off before checking lights state.
          default: 00:00:05
          selector:
            duration: null

        lights_off_verify_retries:
          name: 'Lights: max retry attempts'
          default: 3
          selector:
            number:
              min: 0
              max: 10
              mode: slider

        lights_off_verify_retry_interval:
          name: 'Lights: retry interval'
          description: How long to wait between retry turn-off attempts.
          default: 00:00:05
          selector:
            duration: null

        lights_off_keep_tag_on_failure:
          name: 'Lights: keep auto-tag ON on failure'
          description: >
            If true and retries are exhausted, keep auto_tag_lights ON
            (cleanup blueprint will clear it). If false, clear tag regardless.
          default: true
          selector:
            boolean: null

    night_profile:
      name: Night profile
      icon: mdi:clock-outline
      collapsed: true
      description: >
        Configures the night brightness/transition window.
        night_start and night_end are static fallback values used when the
        corresponding helper is not configured. If a helper is set, it takes
        priority over the static value — set helpers to allow UI-adjustable
        night windows without redeploying the automation.
      input:
        use_night_profile:
          name: 'Lights: use night brightness profile'
          default: true
          selector:
            boolean: null

        night_start:
          name: Night start (static fallback)
          description: >
            Used when night_start_helper is not configured.
            If night_start_helper is set, this value is ignored.
          default: 00:00:00
          selector:
            time: null

        night_end:
          name: Night end (static fallback)
          description: >
            Used when night_end_helper is not configured.
            If night_end_helper is set, this value is ignored.
          default: 06:00:00
          selector:
            time: null

        night_start_helper:
          name: Night start helper (overrides static)
          description: >
            Optional input_datetime. When set, overrides the static night_start value.
            Allows the night window start to be adjusted from the UI without
            redeploying the automation.
          default: ''
          selector:
            entity:
              domain: input_datetime

        night_end_helper:
          name: Night end helper (overrides static)
          description: >
            Optional input_datetime. When set, overrides the static night_end value.
            Allows the night window end to be adjusted from the UI without
            redeploying the automation.
          default: ''
          selector:
            entity:
              domain: input_datetime

        brightness_day_helper:
          name: 'Lights: day brightness helper'
          default: ''
          selector:
            entity:
              domain: input_number

        brightness_night_helper:
          name: 'Lights: night brightness helper'
          default: ''
          selector:
            entity:
              domain: input_number

        brightness_day_pct:
          name: 'Lights: day brightness %'
          default: 100
          selector:
            number:
              min: 1
              max: 100
              mode: slider

        brightness_night_pct:
          name: 'Lights: night brightness %'
          default: 20
          selector:
            number:
              min: 1
              max: 100
              mode: slider

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input occupied_effective
    to: "on"
    for: !input on_debounce
    id: occupied_on

  - trigger: state
    entity_id: !input occupied_effective
    to: "off"
    for: !input lights_off_delay
    id: lights_off

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input soft_off_timer
    id: soft_off_done

  - trigger: event
    event_type: timer.finished
    event_data:
      entity_id: !input lights_verify_timer
    id: lights_verify_done

  - trigger: homeassistant
    event: start
    id: ha_start

variables:
  occ: !input occupied_effective

  lights: !input lights
  lights_on_script: !input lights_on_script
  lights_off_script: !input lights_off_script
  lights_soft_off_enabled: !input lights_soft_off_enabled

  lights_control_enabled: >-
    {{ (lights | length > 0) or (lights_on_script != '') or (lights_off_script != '') }}

  override_b: !input automation_override
  blocking_entities: !input blocking_entities

  auto_tag_lights: !input auto_tag_lights

  cooldown_t: !input cooldown_timer

  light_gating_entity: !input light_gating_entity

  use_night_profile: !input use_night_profile
  night_start: !input night_start
  night_start_helper: !input night_start_helper
  night_end: !input night_end
  night_end_helper: !input night_end_helper

  brightness_day_static: !input brightness_day_pct
  brightness_day_helper: !input brightness_day_helper
  brightness_night_static: !input brightness_night_pct
  brightness_night_helper: !input brightness_night_helper

  transition_on: !input transition_on
  transition_on_night: !input transition_on_night

  startup_cleanup: !input startup_cleanup
  startup_cleanup_delay: !input startup_cleanup_delay

  lights_claim_if_already_on: !input lights_claim_if_already_on

  lights_off_verify_enabled: !input lights_off_verify_enabled
  lights_off_verify_retries: !input lights_off_verify_retries
  lights_off_keep_tag_on_failure: !input lights_off_keep_tag_on_failure

  soft_off_t: !input soft_off_timer
  lights_verify_t: !input lights_verify_timer
  lights_verify_attempts: !input lights_verify_attempts_helper

  override_ok: >-
    {{ override_b == '' or is_state(override_b, 'off') }}

  force_ok: >-
    {{ expand(blocking_entities) | selectattr('state','eq','on') | list | count == 0 }}

  cooldown_active: >-
    {{ cooldown_t != '' and is_state(cooldown_t, 'active') }}

  is_night: >-
    {% set start_t = (states(night_start_helper) if night_start_helper != '' else night_start) %}
    {% set end_t = (states(night_end_helper) if night_end_helper != '' else night_end) %}
    {% set start = today_at(start_t) %}
    {% set end = today_at(end_t) %}
    {% if start <= end %}
      {{ start <= now() < end }}
    {% else %}
      {{ now() >= start or now() < end }}
    {% endif %}

  lights_ok_to_turn_on: >-
    {{ light_gating_entity == '' or is_state(light_gating_entity, 'on') }}

  light_brightness_pct: >-
    {% set day = (states(brightness_day_helper) | int(brightness_day_static)) if brightness_day_helper != '' else (brightness_day_static | int) %}
    {% set night = (states(brightness_night_helper) | int(brightness_night_static)) if brightness_night_helper != '' else (brightness_night_static | int) %}
    {% if use_night_profile and is_night %}
      {{ night }}
    {% else %}
      {{ day }}
    {% endif %}

  transition_on_actual: >-
    {% if use_night_profile and is_night %}
      {{ transition_on_night }}
    {% else %}
      {{ transition_on }}
    {% endif %}

  any_light_on: >-
    {{ expand(lights) | selectattr('state','eq','on') | list | count > 0 }}

  bed_occupied_entity: !input bed_occupied
  suppress_lights_on_when_in_bed: !input suppress_lights_on_when_in_bed

  in_bed: >-
    {{ bed_occupied_entity is not none
       and bed_occupied_entity != ''
       and is_state(bed_occupied_entity, 'on') }}

  manual_off_hold: >-
    {% if auto_tag_lights != '' and states(auto_tag_lights) not in ['unknown', 'unavailable'] %}
      {{ is_state(auto_tag_lights, 'on') and (not any_light_on) }}
    {% else %}
      false
    {% endif %}

  tag_lights_ok_to_off: >-
    {{ auto_tag_lights == '' or is_state(auto_tag_lights, 'on') }}

actions:
  - choose:
      # ==========================================================================
      # OCCUPIED -> ON
      # Cancels all pending vacancy timers, turns lights on.
      # ==========================================================================
      - conditions:
          - condition: trigger
            id: occupied_on
          - condition: template
            value_template: "{{ override_ok }}"
          - condition: template
            value_template: "{{ not cooldown_active }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ soft_off_t != '' }}"
                sequence:
                  - action: timer.cancel
                    target:
                      entity_id: "{{ soft_off_t }}"
            default: []
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_verify_t != '' }}"
                sequence:
                  - action: timer.cancel
                    target:
                      entity_id: "{{ lights_verify_t }}"
            default: []
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_verify_attempts != '' }}"
                sequence:
                  - action: input_number.set_value
                    target:
                      entity_id: "{{ lights_verify_attempts }}"
                    data:
                      value: 0
            default: []

          # ---- Lights ON ----
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_control_enabled }}"
                  - condition: template
                    value_template: "{{ lights_ok_to_turn_on }}"
                  - condition: template
                    value_template: "{{ lights_claim_if_already_on or (not any_light_on) }}"
                  - condition: template
                    value_template: "{{ not manual_off_hold }}"
                  - condition: template
                    value_template: "{{ not (suppress_lights_on_when_in_bed and in_bed and (not any_light_on)) }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_on_script != '' }}"
                        sequence:
                          - action: script.turn_on
                            target:
                              entity_id: "{{ lights_on_script }}"
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ auto_tag_lights != '' }}"
                                sequence:
                                  - action: input_boolean.turn_on
                                    target:
                                      entity_id: "{{ auto_tag_lights }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ (lights_on_script == '') and (lights | length > 0) }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: !input lights
                            data:
                              brightness_pct: "{{ light_brightness_pct }}"
                              transition: "{{ transition_on_actual }}"
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ auto_tag_lights != '' }}"
                                sequence:
                                  - action: input_boolean.turn_on
                                    target:
                                      entity_id: "{{ auto_tag_lights }}"

          # ---- Cooldown timer ----
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ cooldown_t != '' }}"
                sequence:
                  - action: timer.start
                    target:
                      entity_id: "{{ cooldown_t }}"
                    data:
                      duration: !input cooldown_duration

      # ==========================================================================
      # VACANT -> LIGHTS OFF
      # Fires after lights_off_delay. Starts soft-off dim+timer, OR turns lights
      # off directly and starts the verify timer.
      # ==========================================================================
      - conditions:
          - condition: trigger
            id: lights_off
          - condition: template
            value_template: "{{ override_ok }}"
          - condition: template
            value_template: "{{ force_ok }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_control_enabled and tag_lights_ok_to_off }}"
                sequence:
                  - choose:
                      # --- Soft-off path ---
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_soft_off_enabled and (lights | length > 0) and soft_off_t != '' }}"
                        sequence:
                          - action: light.turn_on
                            target:
                              entity_id: !input lights
                            data:
                              brightness_pct: 10
                              transition: 2
                          - action: timer.start
                            target:
                              entity_id: "{{ soft_off_t }}"
                            data:
                              duration: "00:00:15"

                      # --- Direct-off path ---
                      - conditions:
                          - condition: template
                            value_template: "{{ true }}"
                        sequence:
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ lights_off_script != '' }}"
                                sequence:
                                  - action: script.turn_on
                                    target:
                                      entity_id: "{{ lights_off_script }}"
                              - conditions:
                                  - condition: template
                                    value_template: "{{ (lights_off_script == '') and (lights | length > 0) }}"
                                sequence:
                                  - action: light.turn_off
                                    target:
                                      entity_id: !input lights
                                    data:
                                      transition: !input transition_off

                          # Start verify timer or clear tag immediately.
                          - choose:
                              - conditions:
                                  - condition: template
                                    value_template: "{{ lights_off_verify_enabled and lights_verify_t != '' }}"
                                sequence:
                                  - choose:
                                      - conditions:
                                          - condition: template
                                            value_template: "{{ lights_verify_attempts != '' }}"
                                        sequence:
                                          - action: input_number.set_value
                                            target:
                                              entity_id: "{{ lights_verify_attempts }}"
                                            data:
                                              value: 0
                                    default: []
                                  - action: timer.start
                                    target:
                                      entity_id: "{{ lights_verify_t }}"
                                    data:
                                      duration: !input lights_off_verify_delay
                              - conditions:
                                  - condition: template
                                    value_template: "{{ not lights_off_verify_enabled or lights_verify_t == '' }}"
                                sequence:
                                  - choose:
                                      - conditions:
                                          - condition: template
                                            value_template: "{{ auto_tag_lights != '' }}"
                                        sequence:
                                          - action: input_boolean.turn_off
                                            target:
                                              entity_id: "{{ auto_tag_lights }}"
            default: []

      # ==========================================================================
      # SOFT-OFF DONE -> FULL LIGHTS OFF
      # ==========================================================================
      - conditions:
          - condition: trigger
            id: soft_off_done
          - condition: template
            value_template: "{{ soft_off_t != '' and trigger.event.data.entity_id == soft_off_t }}"
          - condition: template
            value_template: "{{ override_ok }}"
          - condition: template
            value_template: "{{ force_ok }}"
          - condition: template
            value_template: "{{ tag_lights_ok_to_off }}"
          - condition: template
            value_template: "{{ is_state(occ, 'off') }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_off_script != '' }}"
                sequence:
                  - action: script.turn_on
                    target:
                      entity_id: "{{ lights_off_script }}"
              - conditions:
                  - condition: template
                    value_template: "{{ (lights_off_script == '') and (lights | length > 0) }}"
                sequence:
                  - action: light.turn_off
                    target:
                      entity_id: !input lights
                    data:
                      transition: !input transition_off
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ lights_off_verify_enabled and lights_verify_t != '' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_verify_attempts != '' }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ lights_verify_attempts }}"
                            data:
                              value: 0
                    default: []
                  - action: timer.start
                    target:
                      entity_id: "{{ lights_verify_t }}"
                    data:
                      duration: !input lights_off_verify_delay
              - conditions:
                  - condition: template
                    value_template: "{{ not lights_off_verify_enabled or lights_verify_t == '' }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ auto_tag_lights != '' }}"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: "{{ auto_tag_lights }}"
            default: []

      # ==========================================================================
      # LIGHTS VERIFY DONE -> CHECK / RETRY / EXHAUST
      # ==========================================================================
      - conditions:
          - condition: trigger
            id: lights_verify_done
          - condition: template
            value_template: "{{ lights_verify_t != '' and trigger.event.data.entity_id == lights_verify_t }}"
          - condition: template
            value_template: "{{ override_ok }}"
          - condition: template
            value_template: "{{ force_ok }}"
          - condition: template
            value_template: "{{ is_state(occ, 'off') }}"
        sequence:
          - variables:
              _attempts_now: >-
                {% if lights_verify_attempts != '' %}
                  {{ states(lights_verify_attempts) | int(0) }}
                {% else %}
                  0
                {% endif %}
              _max: "{{ lights_off_verify_retries | int(0) }}"
              _lights_still_on: >-
                {% if lights | length > 0 %}
                  {{ expand(lights) | selectattr('state', 'in', ['on', 'unavailable', 'unknown']) | list | count > 0 }}
                {% else %}
                  false
                {% endif %}

          - choose:
              # --- PASS: lights confirmed off ---
              - conditions:
                  - condition: template
                    value_template: "{{ not _lights_still_on }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ auto_tag_lights != '' }}"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: "{{ auto_tag_lights }}"
                    default: []
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_verify_attempts != '' }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ lights_verify_attempts }}"
                            data:
                              value: 0
                    default: []

              # --- RETRY: lights still on, retries remaining ---
              - conditions:
                  - condition: template
                    value_template: "{{ _lights_still_on and _attempts_now < _max }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_verify_attempts != '' }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ lights_verify_attempts }}"
                            data:
                              value: "{{ _attempts_now + 1 }}"
                    default: []
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_off_script != '' }}"
                        sequence:
                          - action: script.turn_on
                            target:
                              entity_id: "{{ lights_off_script }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ (lights_off_script == '') and (lights | length > 0) }}"
                        sequence:
                          - action: light.turn_off
                            target:
                              entity_id: !input lights
                            data:
                              transition: !input transition_off
                  - action: timer.start
                    target:
                      entity_id: "{{ lights_verify_t }}"
                    data:
                      duration: !input lights_off_verify_retry_interval

              # --- EXHAUSTED: retries used up, lights still on ---
              - conditions:
                  - condition: template
                    value_template: "{{ _lights_still_on and _attempts_now >= _max }}"
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ (not lights_off_keep_tag_on_failure) and auto_tag_lights != '' }}"
                        sequence:
                          - action: input_boolean.turn_off
                            target:
                              entity_id: "{{ auto_tag_lights }}"
                    default: []
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_verify_attempts != '' }}"
                        sequence:
                          - action: input_number.set_value
                            target:
                              entity_id: "{{ lights_verify_attempts }}"
                            data:
                              value: 0
                    default: []

      # ==========================================================================
      # STARTUP — VALIDATION + CLEANUP
      # Validation fires immediately (before cleanup delay) to surface config
      # issues as persistent notifications on every HA restart.
      # Cleanup runs after startup_cleanup_delay + 15 s double-tap.
      # ==========================================================================
      - conditions:
          - condition: trigger
            id: ha_start
          - condition: template
            value_template: "{{ startup_cleanup }}"
        sequence:
          # ---- Config validation — fires immediately, no delay ----
          - variables:
              _room_id: >-
                {{ occ | replace('binary_sensor.', '') | replace('_occupied_effective', '') }}
              _issues: >-
                {% set ns = namespace(items=[]) %}
                {% if lights_soft_off_enabled and soft_off_t == '' %}
                  {% set ns.items = ns.items + ['lights_soft_off_enabled is true but soft_off_timer is not configured (soft-off will be skipped)'] %}
                {% endif %}
                {% if lights_off_verify_enabled and lights_verify_t == '' %}
                  {% set ns.items = ns.items + ['lights_off_verify_enabled is true but lights_verify_timer is not configured (verify will be skipped)'] %}
                {% endif %}
                {% if (lights_off_verify_retries | int(0)) > 0 and lights_verify_attempts == '' %}
                  {% set ns.items = ns.items + ['lights_off_verify_retries > 0 but lights_verify_attempts_helper is not configured (single check only, no retries)'] %}
                {% endif %}
                {{ ns.items | join('\n• ') }}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ _issues | length > 0 }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: "WITB+ Actions: Config Warning [{{ _room_id }}]"
                      message: "• {{ _issues }}"
                      notification_id: "witb_actions_config_{{ _room_id }}"
            default: []

          # ---- Cleanup sequence ----
          - delay: !input startup_cleanup_delay

          - condition: template
            value_template: >-
              {{ override_b == '' or is_state(override_b, 'off') }}
          - condition: template
            value_template: >-
              {{ expand(blocking_entities) | selectattr('state','eq','on') | list | count == 0 }}
          - condition: template
            value_template: >-
              {{ has_value(occ) and is_state(occ, 'off') }}

          - delay: 00:00:15

          - condition: template
            value_template: >-
              {{ has_value(occ) and is_state(occ, 'off') }}

          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ auto_tag_lights != '' and is_state(auto_tag_lights,'on')
                         and (lights_off_script != '' or lights | length > 0) }}
                sequence:
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ lights_off_script != '' }}"
                        sequence:
                          - action: script.turn_on
                            target:
                              entity_id: "{{ lights_off_script }}"
                      - conditions:
                          - condition: template
                            value_template: "{{ (lights_off_script == '') and (lights | length > 0) }}"
                        sequence:
                          - action: light.turn_off
                            target:
                              entity_id: !input lights
                            data:
                              transition: !input transition_off
                  - action: input_boolean.turn_off
                    target:
                      entity_id: "{{ auto_tag_lights }}"