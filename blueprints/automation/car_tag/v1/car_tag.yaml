blueprint:
  name: Car Tag (1.6.0)
  description: >
    BLE car tag based garage door automation with WiFi backup trigger.
    See CHANGELOG_car_tag.md v1.6.0
  source_url: https://github.com/asucrews/ha-blueprints/blob/main/blueprints/automation/car_tag/v1/car_tag.yaml
  domain: automation
  input:
    esphome_ble:
      name: ESPHome BLE Tag Sensor(s)
      description: Binary sensor(s) for BLE iBeacon group detection.
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    garage_door_cover:
      name: Garage Door Cover
      selector:
        entity:
          domain: cover

    garage_door_status_entity:
      name: Garage Door Status Sensor
      description: >
        Binary sensor representing door state cleanly: on = open, off = closed.
        Typically a template sensor derived from the cover entity.
      selector:
        entity:
          domain: binary_sensor

    garage_door_timer_helper:
      name: Garage Door Close Timer
      selector:
        entity:
          domain: timer

    person_entity:
      name: Person Entity
      description: Person entity to confirm presence for WiFi backup arriving case. Leave empty to disable.
      default: ""
      selector:
        entity:
          domain: person

    wifi_backup_entity:
      name: WiFi Backup Entity
      description: >
        Binary sensor for ESPHome node connectivity. Fires when node comes
        back online and BLE rising edge may have been missed.
      selector:
        entity:
          domain: binary_sensor

    open_debounce:
      name: Open Debounce
      description: How long BLE tag must be detected before opening.
      default:
        hours: 0
        minutes: 0
        seconds: 5
      selector:
        duration:

    close_debounce:
      name: Close Debounce
      description: How long BLE tag must be absent before starting close timer.
      default:
        hours: 0
        minutes: 0
        seconds: 30
      selector:
        duration:

    open_after:
      name: Open After (time window start)
      description: Earliest time door will auto-open. Set both to 00:00:00 to disable.
      default: "00:00:00"
      selector:
        time:

    open_before:
      name: Open Before (time window end)
      description: Latest time door will auto-open. Set both to 00:00:00 to disable.
      default: "00:00:00"
      selector:
        time:

    notify_target:
      name: Notification Target (optional)
      description: Notification service to call, e.g. notify.mobile_app_phone. Leave empty to disable.
      default: ""
      selector:
        text:

variables:
  garage_door_cover: !input garage_door_cover
  garage_door_status_entity: !input garage_door_status_entity
  garage_door_timer_helper: !input garage_door_timer_helper
  person_entity: !input person_entity
  wifi_backup_entity: !input wifi_backup_entity
  esphome_ble: !input esphome_ble
  notify_target: !input notify_target
  open_after: !input open_after
  open_before: !input open_before

mode: single
max_exceeded: silent

triggers:
  # UC1 (arriving) and UC2 (departing): car turned on, BLE rising edge detected
  - trigger: state
    entity_id: !input esphome_ble
    from: "off"
    to: "on"
    for: !input open_debounce
    id: ESPHome BLE Found

  # UC3 (parked): car turned off, BLE falling edge detected
  - trigger: state
    entity_id: !input esphome_ble
    from: "on"
    to: "off"
    for: !input close_debounce
    id: ESPHome BLE Not Found

  # UC5 (arriving backup) and UC6 (departing backup):
  # Node came back online, BLE rising edge may have been missed
  - trigger: state
    entity_id: !input wifi_backup_entity
    to:
      - "on"
      - "home"
    id: WiFi Backup Online

actions:
  - choose:

      # -----------------------------------------------------------------------
      # Branch 1 — BLE Found → Open door
      # UC1: Arriving (person not_home, door closed)
      # UC2: Departing (person home, door closed)
      # No person gate — car on + door closed = open intent regardless of direction
      # RC2: If WiFi fires first and opens door, door will no longer be closed,
      #      so this branch is naturally blocked. No double-action.
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: ESPHome BLE Found
          - condition: template
            value_template: "{{ not is_state(garage_door_cover, 'unavailable') }}"
          - condition: template
            value_template: "{{ is_state(garage_door_status_entity, 'off') }}"
          - condition: template
            value_template: >
              {% if open_after == '00:00:00' and open_before == '00:00:00' %}
                true
              {% else %}
                {% set after = strptime(open_after, '%H:%M:%S').time() %}
                {% set before = strptime(open_before, '%H:%M:%S').time() %}
                {% set t = now().time() %}
                {% if after <= before %}
                  {{ t >= after and t <= before }}
                {% else %}
                  {{ t >= after or t <= before }}
                {% endif %}
              {% endif %}
        sequence:
          - action: cover.open_cover
            data: {}
            target:
              entity_id: !input garage_door_cover
          - if:
              - condition: template
                value_template: "{{ notify_target | length > 0 }}"
            then:
              - action: "{{ notify_target }}"
                data:
                  title: Garage Door
                  message: >
                    Garage door opened — BLE tag detected ({{ trigger.entity_id }}).

      # -----------------------------------------------------------------------
      # Branch 2 — BLE Not Found → Start close timer
      # UC3: Car turned off, person home, door open → start close timer
      # UC4: Car turned off, door already closed → blocked by door state check
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: ESPHome BLE Not Found
          - condition: template
            value_template: "{{ not is_state(garage_door_cover, 'unavailable') }}"
          - condition: template
            value_template: "{{ is_state(garage_door_status_entity, 'on') }}"
          - condition: template
            value_template: >
              {{ person_entity | length == 0
                 or is_state(person_entity, 'home') }}
        sequence:
          - action: timer.start
            data: {}
            target:
              entity_id: !input garage_door_timer_helper
          - if:
              - condition: template
                value_template: "{{ notify_target | length > 0 }}"
            then:
              - action: "{{ notify_target }}"
                data:
                  title: Garage Door
                  message: >
                    Garage door close timer started — BLE tag lost ({{ trigger.entity_id }}).

      # -----------------------------------------------------------------------
      # Branch 3 — WiFi Backup → Open door
      # UC5: Arriving — node back online, person not_home, BLE still off
      # UC6: Departing — node back online, BLE on (car is on = intent to leave)
      # UC7: Node bounce, car off — BLE off + person home → neither condition
      #      passes, branch blocked naturally
      # RC1: If BLE fired first and opened door, door will no longer be closed,
      #      so this branch is naturally blocked. No double-action.
      # -----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: WiFi Backup Online
          - condition: template
            value_template: "{{ not is_state(garage_door_cover, 'unavailable') }}"
          - condition: template
            value_template: "{{ is_state(garage_door_status_entity, 'off') }}"
          - condition: template
            value_template: >
              {% set ble_on = expand(esphome_ble)
                              | selectattr('state', 'eq', 'on')
                              | list | length > 0 %}
              {% set arriving = person_entity | length > 0
                                and is_state(person_entity, 'not_home') %}
              {{ ble_on or arriving }}
          - condition: template
            value_template: >
              {% if open_after == '00:00:00' and open_before == '00:00:00' %}
                true
              {% else %}
                {% set after = strptime(open_after, '%H:%M:%S').time() %}
                {% set before = strptime(open_before, '%H:%M:%S').time() %}
                {% set t = now().time() %}
                {% if after <= before %}
                  {{ t >= after and t <= before }}
                {% else %}
                  {{ t >= after or t <= before }}
                {% endif %}
              {% endif %}
        sequence:
          - action: cover.open_cover
            data: {}
            target:
              entity_id: !input garage_door_cover
          - if:
              - condition: template
                value_template: "{{ notify_target | length > 0 }}"
            then:
              - action: "{{ notify_target }}"
                data:
                  title: Garage Door
                  message: >
                    Garage door opened — WiFi backup trigger
                    ({{ trigger.entity_id }} came online).
