---
room_slug_vacjob:
  input_boolean:
    room_slug_vacjob_enabled:
      name: Roomba VacJob Enabled
    room_slug_vacjob_requested:
      name: Roomba VacJob Requested
    room_slug_vacjob_active:
      name: Roomba VacJob Active
    room_slug_vacjob_error:
      name: Roomba VacJob Error

  input_button:
    room_slug_vacjob_run_now:
      name: Roomba Run Now

  input_select:
    room_slug_vacjob_phase:
      name: Roomba VacJob Phase
      options:
        - idle
        - queued
        - cleaning
        - paused
        - returning
        - docked
        - completed
        - canceled
        - error
        - unavailable
        - unknown

  input_datetime:
    room_slug_vacjob_last_start:
      name: Roomba VacJob Last Start
      has_date: true
      has_time: true
    room_slug_vacjob_last_end:
      name: Roomba VacJob Last End
      has_date: true
      has_time: true

  counter:
    room_slug_vacjob_failures:
      name: Roomba VacJob Failures
    # v1.3: separate counter for user-canceled missions
    room_slug_vacjob_canceled:
      name: Roomba VacJob Canceled

  input_number:
    room_slug_vacjob_max_runtime_min:
      name: Roomba VacJob Max Runtime (min)
      min: 15
      max: 600
      step: 5
      mode: slider
      unit_of_measurement: min
      # Note: 'initial:' removed — deprecated in recent HA versions; ignored
      # after first creation. Set the value in the UI after creating the helper.

    room_slug_vacjob_base_successful:
      name: Roomba Base Successful Missions
      min: 0
      max: 99999
      step: 1
      mode: box
    room_slug_vacjob_base_failed:
      name: Roomba Base Failed Missions
      min: 0
      max: 99999
      step: 1
      mode: box
    room_slug_vacjob_base_canceled:
      name: Roomba Base Canceled Missions
      min: 0
      max: 99999
      step: 1
      mode: box

  timer:
    room_slug_vacjob_watchdog:
      name: Roomba VacJob Watchdog
