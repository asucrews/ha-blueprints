blueprint:
  name: Bathroom Fan From Humidity Delta (1.1.1)
  description: |
    Version: 1.1.1 — see CHANGELOG_humidity_controled_fan.md for full version history.

    Humidity-delta bathroom fan controller for a single room.

    CORE BEHAVIOR
      • Turns fan ON when delta rises above on_threshold for on_for_seconds.
      • Turns fan OFF when delta falls below off_threshold for off_for_seconds.
      • Enforces min_run_seconds before allowing OFF.
      • Enforces max_run_seconds failsafe to prevent runaway runtime.

    NIGHT / RESTART
      • Optional night window suppresses turn-ON actions during quiet hours.
      • On Home Assistant restart, re-evaluates humidity and corrects fan state.
      • OFF correction is always allowed; ON correction is opt-in.

    SENSOR RESTORE SUPPRESSION
      • By default, the fan will not turn ON if the delta sensor just restored
        from unknown/unavailable (e.g. HA restart or sensor reconnect). This
        prevents the fan from turning on unexpectedly after a reboot. Disable
        this if you want the fan to respond immediately to a sensor reconnect.

  source_url: https://github.com/asucrews/ha-blueprints/blob/main/blueprints/automation/humidity_controled_fan/v1/humidity_controled_fan.yaml
  domain: automation
  author: asucrews
  homeassistant:
    min_version: 2026.3.0
  input:
    delta_sensor:
      name: Humidity delta sensor (%)
      selector:
        entity:
          domain: sensor

    fan_entity:
      name: Exhaust fan entity (fan or switch)
      selector:
        entity:
          filter:
            - domain: fan
            - domain: switch
            - domain: light

    on_threshold:
      name: Turn ON when delta ≥ (%)
      default: 8
      selector:
        number:
          min: 1
          max: 30
          step: 0.5
          unit_of_measurement: "%"

    on_for_seconds:
      name: Delta must stay high for (seconds)
      description: >
        Debounce: the delta must remain above the ON threshold for this many
        seconds before the fan turns on. Prevents brief humidity spikes (e.g.
        a hot drink nearby) from triggering the fan.
      default: 120
      selector:
        number:
          min: 0
          max: 1800
          step: 10
          unit_of_measurement: seconds

    off_threshold:
      name: Turn OFF when delta ≤ (%)
      default: 3
      selector:
        number:
          min: 0
          max: 30
          step: 0.5
          unit_of_measurement: "%"

    off_for_seconds:
      name: Delta must stay low for (seconds)
      description: >
        Debounce: the delta must remain below the OFF threshold for this many
        seconds before the fan turns off. Prevents the fan from cycling off
        prematurely while humidity is still falling.
      default: 600
      selector:
        number:
          min: 0
          max: 7200
          step: 10
          unit_of_measurement: seconds

    min_run_seconds:
      name: Minimum fan runtime (seconds)
      description: >
        The fan will not turn off until it has been running for at least this
        long, even if the delta drops quickly. Set to 0 to disable.
      default: 300
      selector:
        number:
          min: 0
          max: 7200
          step: 10
          unit_of_measurement: seconds

    max_run_seconds:
      name: Failsafe max runtime (seconds)
      description: >
        The fan will always be turned off after this many seconds, regardless
        of humidity levels. Guards against the sensor going unavailable while
        the fan is running.
      default: 5400
      selector:
        number:
          min: 300
          max: 21600
          step: 60
          unit_of_measurement: seconds

    night_mode_enabled:
      name: Enable night mode
      description: >
        When enabled, the fan will NOT turn ON during the quiet window defined
        by the start/end times below. The fan can still turn OFF during night
        hours (safe direction — you want it to finish, not get stuck on).
        Has no effect when disabled (default).
      default: false
      selector:
        boolean:

    night_start:
      name: Night window — start time
      description: >
        Time at which the night quiet window begins. Only relevant when night
        mode is enabled. Supports overnight spans (e.g. 22:00 → 07:00).
      default: "22:00:00"
      selector:
        time:

    night_end:
      name: Night window — end time
      description: >
        Time at which the night quiet window ends. Only relevant when night
        mode is enabled. May be earlier than the start time for an overnight
        span (e.g. start 22:00, end 07:00).
      default: "07:00:00"
      selector:
        time:

    ha_start_allow_turn_on:
      name: Allow HA restart to turn fan ON
      description: >
        On HA restart the automation re-evaluates humidity and corrects the fan
        state. By default only a turn-OFF correction is permitted — this is the
        safe direction and avoids the fan running unexpectedly (or waking
        anyone up) after a restart. Enable this if you also want the fan turned
        ON automatically when humidity is already elevated at restart time.
        Night mode is respected even when this is enabled.
      default: false
      selector:
        boolean:

    suppress_turn_on_after_sensor_restore:
      name: Suppress turn-on after sensor restore
      description: >
        When enabled (default), the fan will NOT turn on if the delta sensor
        just transitioned from unknown or unavailable — which happens on HA
        restart or when the sensor reconnects after a drop. This prevents the
        fan from turning on unexpectedly after a reboot when humidity was
        already elevated before the restart.
        Disable if you want the fan to turn on immediately when the sensor
        reconnects and humidity is high.
      default: true
      selector:
        boolean:

mode: restart

# Blueprint inputs captured as variables so Jinja templates in action steps
# can reference them by name.  _in_night_window is NOT computed here because
# it depends on now() and must be re-evaluated on every run.
variables:
  _night_mode: !input night_mode_enabled
  _night_start: !input night_start
  _night_end: !input night_end
  _ha_start_allow_turn_on: !input ha_start_allow_turn_on
  _suppress_restore: !input suppress_turn_on_after_sensor_restore

triggers:
  - trigger: numeric_state
    entity_id: !input delta_sensor
    above: !input on_threshold
    for:
      seconds: !input on_for_seconds
    id: turn_on

  - trigger: numeric_state
    entity_id: !input delta_sensor
    below: !input off_threshold
    for:
      seconds: !input off_for_seconds
    id: turn_off

  - trigger: state
    entity_id: !input fan_entity
    to: "on"
    for:
      seconds: !input max_run_seconds
    id: failsafe

  - trigger: homeassistant
    event: start
    id: ha_start

actions:
  # Compute whether we are currently inside the night quiet window.
  # This is an action-step variable so now() is always the real current
  # time for this run, not the time the automation was last loaded.
  # Result: true  = inside quiet window → suppress turn-on
  #         false = outside quiet window (or night mode disabled) → allow turn-on
  - variables:
      _in_night_window: >
        {% if not _night_mode %}
          false
        {% else %}
          {% set s = _night_start %}
          {% set e = _night_end %}
          {% set t = now().strftime('%H:%M:%S') %}
          {% if s <= e %}
            {{ (s <= t) and (t < e) }}
          {% else %}
            {{ (t >= s) or (t < e) }}
          {% endif %}
        {% endif %}

  - choose:
      # ── Turn ON ──────────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: turn_on
          - condition: state
            entity_id: !input fan_entity
            state: "off"
          - condition: template
            value_template: "{{ not _in_night_window }}"
          # Suppress turn-on when the sensor just restored from unknown/unavailable
          # (HA restart or sensor reconnect). trigger.from_state.state will be
          # 'unknown' or 'unavailable' in that scenario.
          - condition: template
            value_template: >
              {{ not _suppress_restore or
                 trigger.from_state.state not in ['unknown', 'unavailable'] }}
        sequence:
          - action: homeassistant.turn_on
            target:
              entity_id: !input fan_entity

      # ── Turn OFF (hysteresis + min-runtime guard) ─────────────────────
      - conditions:
          - condition: trigger
            id: turn_off
          - condition: state
            entity_id: !input fan_entity
            state: "on"
            for:
              seconds: !input min_run_seconds
        sequence:
          - action: homeassistant.turn_off
            target:
              entity_id: !input fan_entity

      # ── Failsafe max runtime ──────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: failsafe
        sequence:
          - action: homeassistant.turn_off
            target:
              entity_id: !input fan_entity

      # ── HA restart: re-evaluate and correct fan state ─────────────────
      - conditions:
          - condition: trigger
            id: ha_start
        sequence:
          # Allow sensors and the rest of HA to finish starting up before
          # we read any state.
          - delay:
              seconds: 30

          # After the settling delay, attempt a turn-ON if permitted.
          # The night-window check is re-evaluated here (inline) so it
          # reflects the actual time after the 30-second wait rather than
          # the time the automation triggered.
          - if:
              - condition: template
                value_template: >
                  {% if not _ha_start_allow_turn_on %}
                    false
                  {% elif not _night_mode %}
                    true
                  {% else %}
                    {% set s = _night_start %}
                    {% set e = _night_end %}
                    {% set t = now().strftime('%H:%M:%S') %}
                    {% if s <= e %}
                      {{ not ((s <= t) and (t < e)) }}
                    {% else %}
                      {{ not ((t >= s) or (t < e)) }}
                    {% endif %}
                  {% endif %}
              - condition: numeric_state
                entity_id: !input delta_sensor
                above: !input on_threshold
              - condition: state
                entity_id: !input fan_entity
                state: "off"
            then:
              - action: homeassistant.turn_on
                target:
                  entity_id: !input fan_entity
            else:
              # Always attempt a turn-OFF correction regardless of the flags
              # above — bringing the fan off is always the safe direction.
              - if:
                  - condition: numeric_state
                    entity_id: !input delta_sensor
                    below: !input off_threshold
                  - condition: state
                    entity_id: !input fan_entity
                    state: "on"
                then:
                  - action: homeassistant.turn_off
                    target:
                      entity_id: !input fan_entity
