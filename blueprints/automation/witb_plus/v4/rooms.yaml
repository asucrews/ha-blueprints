# rooms.yaml — WITB+ Standard Helper Packages
# Template: witb_plus_package_template.yaml
#
# Run with: python generate_witb_packages_templated.py --config rooms_witb.yaml

template: witb_plus_package_template.yaml
out: ./packages/witb
areas_script: ./assign_areas_witb.py
key_suffix: _witb

rooms:
  - name: "Garage"
    area: "Garage"

  - name: "Half Bathroom"
    area: "Half Bathroom"

  - name: "Master Bedroom"
    area: "Master Bedroom"

  - name: "Master Bedroom Closet"
    area: "Master Bedroom Closet"

  - name: "Master Bathroom"
    area: "Master Bathroom"

  - name: "Master Bathroom Toilet"
    area: "Master Bathroom Toilet"

  - name: "Laundry"
    area: "Laundry"

  - name: "Office"
    area: "Office"
