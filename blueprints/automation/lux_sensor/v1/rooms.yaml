# rooms.yaml — Lux Baseline + Delta Packages
# Template: room_lux_baseline_delta_package_template.yaml
#
# Each room requires one external token (entity ID assigned by HA at
# device integration time — cannot be derived from room_slug):
#   __LUX_SENSOR__  physical illuminance sensor (e.g. from motion/multi-sensor device)
#
# Fill in the actual entity IDs below before running the generator.
# Run with: python generate_witb_packages_templated.py --config rooms_lux.yaml

template: room_lux_baseline_delta_package_template.yaml
out: ./packages
areas_script: ./assign_areas_lux.py
key_suffix: _lux_delta

rooms:
  - name: "Family Room"
    area: "Family Room"
    tokens:
      __LUX_SENSOR__: sensor.family_room_lux_level

  - name: "Dinning Room"
    area: "Dinning Room"
    tokens:
      __LUX_SENSOR__: sensor.dinning_room_lux_level

  - name: "Office"
    area: "Office"
    tokens:
      __LUX_SENSOR__: sensor.office_lux_level

  - name: "Master Bedroom"
    area: "Master Bedroom"
    tokens:
      __LUX_SENSOR__: sensor.master_bedroom_lux_level
